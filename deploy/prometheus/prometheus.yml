# Prometheus scrape config for codeRunner-server
#
# Scrapes the Go /metrics endpoint exposed at :7979/metrics.
# The server container is reachable by its compose service name
# "code-runner-server" on the default bridge network.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    env: product

scrape_configs:
  - job_name: code-runner-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - code-runner-server:7979
        labels:
          service: code-runner-server

  # worker 在内网，主动 push 到 pushgateway；honor_labels 让 worker 自带的 instance/job 不被覆盖
  - job_name: code-runner-worker
    honor_labels: true
    static_configs:
      - targets:
          - pushgateway:9091
        labels:
          service: code-runner-worker

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
