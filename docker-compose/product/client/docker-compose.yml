version: '3.8'

services:
  code-runner-api-client:
    build:
      context: .
      dockerfile: builds/api/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/app/tmp:shared
    environment:
      - APP_ENV=production
      - DOCKER_HOST=unix:///var/run/docker.sock

  # Runner 容器：长期运行，由 docker-compose 统一管理资源限制
  code-runner-go:
    image: code-runner-go:latest
    build:
      context: .
      dockerfile: builds/runners/go.Dockerfile
    container_name: code-runner-go
    command: sleep infinity
    restart: unless-stopped
    network_mode: none
    cap_drop:
      - ALL
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    volumes:
      - /tmp/golang:/app

  code-runner-python:
    image: code-runner-python:latest
    build:
      context: .
      dockerfile: builds/runners/python.Dockerfile
    container_name: code-runner-python
    command: sleep infinity
    restart: unless-stopped
    network_mode: none
    cap_drop:
      - ALL
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    volumes:
      - /tmp/python:/app

  code-runner-cpp:
    image: code-runner-cpp:latest
    build:
      context: .
      dockerfile: builds/runners/cpp.Dockerfile
    container_name: code-runner-cpp
    command: sleep infinity
    restart: unless-stopped
    network_mode: none
    cap_drop:
      - ALL
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    volumes:
      - /tmp/c:/app

  code-runner-java:
    image: code-runner-java:latest
    build:
      context: .
      dockerfile: builds/runners/java.Dockerfile
    container_name: code-runner-java
    command: sleep infinity
    restart: unless-stopped
    network_mode: none
    cap_drop:
      - ALL
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    volumes:
      - /tmp/java:/app

  code-runner-js:
    image: code-runner-js:latest
    build:
      context: .
      dockerfile: builds/runners/js.Dockerfile
    container_name: code-runner-js
    command: sleep infinity
    restart: unless-stopped
    network_mode: none
    cap_drop:
      - ALL
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    volumes:
      - /tmp/javascript:/app
