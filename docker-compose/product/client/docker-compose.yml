services:
  code-runner-api-client:
    image: coderunner-client:latest
    container_name: coderunner-client
    build:
      context: ../../..
      dockerfile: builds/api/Dockerfile
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/app/tmp:shared
    environment:
      - APP_MODE=client
      - APP_ENV=production
      - DOCKER_HOST=unix:///var/run/docker.sock

  # Runner 容器：长期运行，由 docker-compose 统一管理资源限制
  code-runner-go-0:
    image: code-runner-go:latest
    build:
      context: ../../..
      dockerfile: builds/runners/go.Dockerfile
    container_name: code-runner-go-0
    command: sleep infinity
    restart: unless-stopped
    network_mode: none
    cap_drop:
      - ALL
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    pids_limit: 128
    volumes:
      - /tmp/golang-0:/app

  code-runner-go-1:
    image: code-runner-go:latest
    build:
      context: ../../..
      dockerfile: builds/runners/go.Dockerfile
    container_name: code-runner-go-1
