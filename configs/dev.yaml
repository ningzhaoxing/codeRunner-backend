server:
  etcd:
    endpoints: "192.168.10.4:2379"
    key: "/services/code-runner"
  grpc:
    host: "192.168.10.19"
    port: "50011"
  app:
    host: "0.0.0.0"
    port: "50012"
  redis:
     host: "192.168.10.19"
     port: "6379"

client:
  server:
    host: "192.168.10.19"
    port: "50012"
    path: "ws"
  app:
    weight: 1
  container_pool:
    golang: 1
    python: 1
    javascript: 1
    java: 1
    c: 1

logger:
  level: "info"
  format: "json"
  enable_console: false
#  path: "./app.log"

agent:
  enabled: true
  api_key: ${AGENT_API_KEY}
  provider: claude
  max_steps: 10
  session_ttl: 3600
  proposal_ttl: 600
  summarization:
    trigger_tokens: 8000
  reduction:
    max_length_for_trunc: 50000
    max_tokens_for_clear: 160000
  claude:
    api_key: ${CLAUDE_API_KEY}
    model: ${CLAUDE_MODEL}
    base_url: ${CLAUDE_BASE_URL}
  openai:
    api_key: ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL}
    base_url: ${OPENAI_BASE_URL}
  qwen:
    api_key: ${QWEN_API_KEY}
    model: ${QWEN_MODEL}
    base_url: ${QWEN_BASE_URL}

auth:
  frontend_base_url: ${AUTH_FRONTEND_BASE_URL}
  github:
    client_id: ${GITHUB_CLIENT_ID}
    client_secret: ${GITHUB_CLIENT_SECRET}
    redirect_url: ${GITHUB_REDIRECT_URL}
  jwt:
    secret: ${AUTH_JWT_SECRET}
    ttl_seconds: 604800
  cookie:
    name: "cr_auth"
    secure: false

mail:
  enabled: false
  host: smtp.qq.com
  port: 465
  username: your_qq@qq.com
  password: ${MAIL_PASSWORD}
  from: your_qq@qq.com
  to: your_qq@qq.com
  send_timeout: 3s

feedback:
  rate_limit_per_min: 3
  rate_limit_per_day: 20
