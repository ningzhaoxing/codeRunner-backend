server:
  etcd:
    endpoints: "192.168.10.4:2379"
    key: "/services/code-runner"
  grpc:
    host: "192.168.10.19"
    port: "50011"
  app:
    host: "0.0.0.0"
    port: "50012"
  redis:
     host: "192.168.10.19"
     port: "6379"

client:
  server:
    host: "192.168.10.19"
    port: "50012"
    path: "ws"
  app:
    weight: 1
  container_pool:
    golang: 1
    python: 1
    javascript: 1
    java: 1
    c: 1

logger:
  level: "info"
  format: "json"
  enable_console: false
#  path: "./app.log"

agent:
  enabled: true
  api_key: ${AGENT_API_KEY}
  provider: claude
  max_steps: 10
  session_ttl: 3600
  proposal_ttl: 600
  summarization:
    trigger_tokens: 8000
  reduction:
    max_length_for_trunc: 50000
    max_tokens_for_clear: 160000
  claude:
    api_key: ${CLAUDE_API_KEY}
    model: claude-opus-4-6
  openai:
    api_key: ${OPENAI_API_KEY}
    model: gpt-4o