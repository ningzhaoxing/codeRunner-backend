server:
  etcd:
    endpoints: "101.42.7.205:2378"
    key: "/services/code-runner"
  grpc:
    host: "101.42.7.205"
    port: "50011"
  app:
    host: "0.0.0.0"
    port: "7979"
  redis:
    host: "redis"
    port: "6379"

client:
  server:
    host: "101.42.7.205"
    port: "7979"
    path: "ws"
  app:
    weight: 1
  container_pool:
    golang: 2
    python: 2
    javascript: 2
    java: 1
    c: 2

logger:
  level: "info"
  format: "json"
  enable_console : false
  path: "./app.log"

agent:
  enabled: true
  api_key: ${AGENT_API_KEY}
  provider: qwen
  max_steps: 10
  session_ttl: 3600
  proposal_ttl: 600
  summarization:
    trigger_tokens: 8000
  reduction:
    max_length_for_trunc: 50000
    max_tokens_for_clear: 160000
  claude:
    api_key: ${CLAUDE_API_KEY}
    model: claude-opus-4-6
  openai:
    api_key: ${OPENAI_API_KEY}
    model: gpt-4o
  qwen:
    api_key: ${QWEN_API_KEY}
    model: qwen-plus

mail:
  enabled: true
  host: smtp.qq.com
  port: 465
  username: 1282270052@qq.com
  password: ${MAIL_PASSWORD}
  from: 1282270052@qq.com
  to: 1282270052@qq.com
  send_timeout: 3s

feedback:
  rate_limit_per_min: 3
  rate_limit_per_day: 20