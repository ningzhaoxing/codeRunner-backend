server:
  etcd:
    endpoints: "101.42.7.205:2378"
    key: "/services/code-runner"
  grpc:
    host: "101.42.7.205"
    port: "50011"
  app:
    host: "0.0.0.0"
    port: "7979"
  redis:
    host: "redis"
    port: "6379"

client:
  server:
    host: "101.42.7.205"
    port: "7979"
    path: "ws"
  app:
    weight: 1
  metrics:
    pushgateway_url: "http://101.42.7.205:9091"
    job_name: "code-runner-worker"
    push_interval: 15s
  container_pool:
    golang: 2
    python: 2
    javascript: 2
    java: 1
    c: 2

logger:
  level: "info"
  format: "json"
  enable_console : false
  path: "./app.log"

agent:
  enabled: true
  api_key: ${AGENT_API_KEY}
  provider: qwen
  max_steps: 10
  session_ttl: 3600
  proposal_ttl: 600
  summarization:
    trigger_tokens: 8000
  reduction:
    max_length_for_trunc: 50000
    max_tokens_for_clear: 160000
  claude:
    api_key: ${CLAUDE_API_KEY}
    model: ${CLAUDE_MODEL}
    base_url: ${CLAUDE_BASE_URL}
  openai:
    api_key: ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL}
    base_url: ${OPENAI_BASE_URL}
  qwen:
    api_key: ${QWEN_API_KEY}
    model: ${QWEN_MODEL}
    base_url: ${QWEN_BASE_URL}

auth:
  frontend_base_url: ${AUTH_FRONTEND_BASE_URL}
  github:
    client_id: ${GITHUB_CLIENT_ID}
    client_secret: ${GITHUB_CLIENT_SECRET}
    redirect_url: ${GITHUB_REDIRECT_URL}
  jwt:
    secret: ${AUTH_JWT_SECRET}
    ttl_seconds: 604800
  cookie:
    name: "cr_auth"
    secure: false

mail:
  enabled: true
  host: smtp.qq.com
  port: 465
  username: 1282270052@qq.com
  password: ${MAIL_PASSWORD}
  from: 1282270052@qq.com
  to: 1282270052@qq.com
  send_timeout: 3s

feedback:
  rate_limit_per_min: 3
  rate_limit_per_day: 20
