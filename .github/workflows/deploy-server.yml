name: Deploy Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: coderunner-server
  LEGACY_CONTAINER_NAME: coderunner-server
  DEPLOY_PATH: /root/workspace/codeRunner/codeRunner-backend
  SERVER_COMPOSE_DIR: docker-compose/product/server
  CLIENT_COMPOSE_DIR: docker-compose/product/client

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            # Ensure GitHub host key is trusted
            mkdir -p ~/.ssh
            ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null

            # Pull latest code
            if [ ! -d "${{ env.DEPLOY_PATH }}/.git" ]; then
              mkdir -p ${{ env.DEPLOY_PATH }}
              git clone git@github.com:ningzhaoxing/codeRunner-backend.git ${{ env.DEPLOY_PATH }}
            fi
            cd ${{ env.DEPLOY_PATH }}

            # Preserve .env before reset (it's gitignored)
            [ -f .env ] && cp .env /tmp/.env.bak

            git fetch origin main
            git reset --hard origin/main

            # Restore .env
            if [ -f /tmp/.env.bak ]; then
              mv /tmp/.env.bak .env
            elif [ ! -f .env ]; then
              echo "ERROR: .env file not found at ${{ env.DEPLOY_PATH }}/.env"
              echo "Please create it on the server first: cp .env.example .env && edit .env"
              exit 1
            fi

            # Build the server image locally (compose references it by name)
            /usr/bin/docker build --no-cache \
              -f builds/api/Dockerfile \
              -t ${{ env.IMAGE_NAME }}:latest .

            # Remove legacy standalone container from pre-compose deploys, if any.
            # Compose-managed containers have different names and are untouched.
            /usr/bin/docker rm -f ${{ env.LEGACY_CONTAINER_NAME }} 2>/dev/null || true

            # Bring up the full stack (redis + server + prometheus + grafana)
            cd ${{ env.SERVER_COMPOSE_DIR }}
            /usr/bin/docker compose \
              --env-file ${{ env.DEPLOY_PATH }}/.env \
              up -d --remove-orphans

            # Bring up worker + runner containers required by code execution.
            cd ${{ env.DEPLOY_PATH }}/${{ env.CLIENT_COMPOSE_DIR }}
            /usr/bin/docker compose \
              --env-file ${{ env.DEPLOY_PATH }}/.env \
              up -d --build --remove-orphans

            # Cleanup dangling images from the rebuild
            /usr/bin/docker image prune -f
